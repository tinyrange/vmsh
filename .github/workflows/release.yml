name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build-unix-windows:
    name: Build ${{ matrix.goos }} ${{ matrix.goarch }}
    runs-on: ubuntu-24.04
    strategy:
      fail-fast: false
      matrix:
        include:
          - goos: linux
            goarch: amd64
          - goos: linux
            goarch: arm64
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          submodules: recursive

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache-dependency-path: |
            go.sum
            cc/go.sum

      - name: Build release payload
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          EXE: ${{ matrix.ext }}
        run: |
          set -euo pipefail
          version="${GITHUB_REF_NAME}"
          name="vmsh_${version}_${GOOS}_${GOARCH}${EXE}"
          mkdir -p dist build/release

          cd cc
          CGO_ENABLED=0 GOOS=linux GOARCH=arm64 go build -trimpath -o ../build/release/init-linux-arm64 ./internal/cmd/init
          install -m 644 ../build/release/init-linux-arm64 internal/guestinit/guest-init-linux-arm64
          CGO_ENABLED=0 GOOS=linux GOARCH=amd64 go build -trimpath -o ../build/release/init-linux-amd64 ./internal/cmd/init
          install -m 644 ../build/release/init-linux-amd64 internal/guestinit/guest-init-linux-amd64
          cd ..
          GOOS="$GOOS" GOARCH="$GOARCH" go build -trimpath -tags "embed_ccvm embed_guestinit" -o "dist/${name}" ./cmd/vmsh

      - name: Upload binary
        uses: actions/upload-artifact@v4
        with:
          name: vmsh-${{ matrix.goos }}-${{ matrix.goarch }}
          path: dist/vmsh_${{ github.ref_name }}_${{ matrix.goos }}_${{ matrix.goarch }}${{ matrix.ext }}
          if-no-files-found: error

  build-macos:
    name: Build signed macOS ARM64
    runs-on: macos-15
    env:
      MACOS_CERTIFICATE: ${{ secrets.MACOS_CERTIFICATE }}
      MACOS_CERTIFICATE_PWD: ${{ secrets.MACOS_CERTIFICATE_PWD }}
      MACOS_DEVELOPER_ID: ${{ secrets.MACOS_DEVELOPER_ID || secrets.DEVELOPER_ID }}
      APPLE_ID: ${{ secrets.APPLE_ID }}
      APPLE_ID_PASSWORD: ${{ secrets.APPLE_ID_PASSWORD }}
      TEAM_ID: ${{ secrets.TEAM_ID }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          submodules: recursive

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache-dependency-path: |
            go.sum
            cc/go.sum

      - name: Check macOS signing and notarization secrets
        run: |
          set -euo pipefail
          missing=()
          for name in MACOS_CERTIFICATE MACOS_CERTIFICATE_PWD MACOS_DEVELOPER_ID APPLE_ID_PASSWORD; do
            if [ -z "${!name}" ]; then
              missing+=("$name")
            fi
          done
          if [[ "$APPLE_ID_PASSWORD" != @keychain:* ]]; then
            for name in APPLE_ID TEAM_ID; do
              if [ -z "${!name}" ]; then
                missing+=("$name")
              fi
            done
          fi
          if [ "${#missing[@]}" -ne 0 ]; then
            printf 'Missing required macOS release secrets:\n' >&2
            printf '  %s\n' "${missing[@]}" >&2
            exit 1
          fi

      - name: Import Developer ID certificate
        run: |
          set -euo pipefail
          printf '%s' "$MACOS_CERTIFICATE" | base64 -D > certificate.p12
          trap "rm -f certificate.p12" EXIT
          security create-keychain -p actions build.keychain
          security default-keychain -s build.keychain
          security unlock-keychain -p actions build.keychain
          security import certificate.p12 -k build.keychain -P "$MACOS_CERTIFICATE_PWD" -T /usr/bin/codesign
          security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k actions build.keychain

      - name: Build macOS payload
        run: |
          set -euo pipefail
          version="${GITHUB_REF_NAME}"
          name="vmsh_${version}_darwin_arm64"
          mkdir -p dist build/release

          cd cc
          CGO_ENABLED=0 GOOS=linux GOARCH=arm64 go build -trimpath -o ../build/release/init-linux-arm64 ./internal/cmd/init
          install -m 644 ../build/release/init-linux-arm64 internal/guestinit/guest-init-linux-arm64
          CGO_ENABLED=0 GOOS=linux GOARCH=amd64 go build -trimpath -o ../build/release/init-linux-amd64 ./internal/cmd/init
          install -m 644 ../build/release/init-linux-amd64 internal/guestinit/guest-init-linux-amd64
          cd ..
          GOOS=darwin GOARCH=arm64 go build -trimpath -tags "embed_ccvm embed_guestinit" -o "dist/${name}" ./cmd/vmsh

      - name: Sign macOS binaries
        run: |
          set -euo pipefail
          name="vmsh_${GITHUB_REF_NAME}_darwin_arm64"
          codesign \
            --force \
            --sign "$MACOS_DEVELOPER_ID" \
            --entitlements tools/entitlements.xml \
            --timestamp \
            --options runtime \
            --keychain build.keychain \
            "dist/${name}"
          codesign --verify --strict --verbose=2 "dist/${name}"
          codesign -d --verbose=4 "dist/${name}" 2>&1 | grep runtime

      - name: Notarize macOS binary
        run: |
          set -euo pipefail
          name="vmsh_${GITHUB_REF_NAME}_darwin_arm64"
          notary_zip="dist/${name}_notary.zip"
          ditto -c -k --keepParent "dist/${name}" "$notary_zip"

          if [[ "$APPLE_ID_PASSWORD" == @keychain:* ]]; then
            notary_profile="${APPLE_ID_PASSWORD#@keychain:}"
            xcrun notarytool submit "$notary_zip" \
              --keychain-profile "$notary_profile" \
              --wait \
              --timeout 30m
          else
            xcrun notarytool submit "$notary_zip" \
              --apple-id "$APPLE_ID" \
              --password "$APPLE_ID_PASSWORD" \
              --team-id "$TEAM_ID" \
              --wait \
              --timeout 30m
          fi

          rm -f "$notary_zip"
          codesign --verify --strict --verbose=2 "dist/${name}"

      - name: Upload binary
        uses: actions/upload-artifact@v4
        with:
          name: vmsh-darwin-arm64
          path: dist/vmsh_${{ github.ref_name }}_darwin_arm64
          if-no-files-found: error

  publish:
    name: Publish GitHub Release
    needs: [build-unix-windows, build-macos]
    runs-on: ubuntu-24.04
    steps:
      - name: Download binaries
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Generate checksums
        run: |
          set -euo pipefail
          find artifacts -type f -name 'vmsh_*' -print0 |
            sort -z |
            xargs -0 sha256sum |
            sed 's#artifacts/[^/]*/##' > checksums.txt
          cat checksums.txt

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            artifacts/**/vmsh_*
            checksums.txt
